name: Windows Smoke Test

'on':
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hosts-block-payload:
    name: hosts-block PowerShell payload (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Execute :block_idm_hosts payload against a synthetic hosts file
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          # Synthetic hosts file that intentionally contains a STALE IAS-NADIF-BLOCK
          # region so we can prove the payload purges old entries before writing
          # fresh ones (idempotency).
          $fixture = @(
            '# Copyright (c) 1993-2009 Microsoft Corp.',
            '',
            '127.0.0.1 localhost',
            '::1       localhost',
            '',
            '# IAS-NADIF-BLOCK START',
            '0.0.0.0 obsolete.example # IAS-NADIF-BLOCK',
            '# IAS-NADIF-BLOCK END',
            '',
            '192.168.1.1 router.lan'
          )

          $tmp = New-TemporaryFile
          [System.IO.File]::WriteAllLines($tmp.FullName, $fixture, [System.Text.Encoding]::ASCII)

          # Exact payload shipped in :block_idm_hosts.
          $p = $tmp.FullName
          $m = '# IAS-NADIF-BLOCK'
          $lines = @(Get-Content -LiteralPath $p -ErrorAction Stop)
          $kept  = $lines | Where-Object { $_ -notmatch [regex]::Escape($m) }
          while ($kept.Count -gt 0 -and [string]::IsNullOrWhiteSpace($kept[-1])) {
              $kept = $kept[0..($kept.Count - 2)]
          }
          $domains = @(
            'registeridm.com','www.registeridm.com','secure.registeridm.com',
            'tonec.com','www.tonec.com','secure.tonec.com',
            'mirror.internetdownloadmanager.com',
            'mirror2.internetdownloadmanager.com',
            'mirror3.internetdownloadmanager.com'
          )
          $block  = @('')
          $block += ($m + ' START')
          foreach ($d in $domains) { $block += ('0.0.0.0 ' + $d + ' ' + $m) }
          $block += ($m + ' END')
          $out = @($kept) + $block
          [System.IO.File]::WriteAllLines($p, $out, [System.Text.Encoding]::ASCII)

          Write-Host '=== Hosts file after first write ==='
          Get-Content -LiteralPath $p | ForEach-Object { Write-Host $_ }

          # Assertions: markers + sentinel domains present; stale entry purged;
          # original non-block lines preserved.
          $final = Get-Content -LiteralPath $p
          $assert = @{
            'START marker present'        = { $final -contains '# IAS-NADIF-BLOCK START' }
            'END marker present'          = { $final -contains '# IAS-NADIF-BLOCK END' }
            'registeridm entry present'   = { $final -contains '0.0.0.0 registeridm.com # IAS-NADIF-BLOCK' }
            'tonec entry present'         = { $final -contains '0.0.0.0 tonec.com # IAS-NADIF-BLOCK' }
            'mirror3 entry present'       = { $final -contains '0.0.0.0 mirror3.internetdownloadmanager.com # IAS-NADIF-BLOCK' }
            'stale IAS entry purged'      = { -not ($final | Where-Object { $_ -match 'obsolete\.example' }) }
            'localhost preserved'         = { $final -contains '127.0.0.1 localhost' }
            'router preserved'            = { $final -contains '192.168.1.1 router.lan' }
            'single START occurrence'     = { (($final | Where-Object { $_ -eq '# IAS-NADIF-BLOCK START' }) | Measure-Object).Count -eq 1 }
            'single END occurrence'       = { (($final | Where-Object { $_ -eq '# IAS-NADIF-BLOCK END'   }) | Measure-Object).Count -eq 1 }
          }
          foreach ($k in $assert.Keys) {
            if (-not (& $assert[$k])) { throw ('Assertion FAILED: ' + $k) }
            Write-Host ('OK: ' + $k)
          }

          # Idempotency: run the payload a SECOND time and assert the content is
          # byte-identical to the first write. This guards against accumulation
          # of duplicate blocks or trailing whitespace growth on repeat calls.
          $snapshotA = [System.IO.File]::ReadAllBytes($p)

          $lines = @(Get-Content -LiteralPath $p -ErrorAction Stop)
          $kept  = $lines | Where-Object { $_ -notmatch [regex]::Escape($m) }
          while ($kept.Count -gt 0 -and [string]::IsNullOrWhiteSpace($kept[-1])) {
              $kept = $kept[0..($kept.Count - 2)]
          }
          $block  = @('')
          $block += ($m + ' START')
          foreach ($d in $domains) { $block += ('0.0.0.0 ' + $d + ' ' + $m) }
          $block += ($m + ' END')
          $out = @($kept) + $block
          [System.IO.File]::WriteAllLines($p, $out, [System.Text.Encoding]::ASCII)

          $snapshotB = [System.IO.File]::ReadAllBytes($p)
          if ($snapshotA.Length -ne $snapshotB.Length) {
            throw ('Idempotency FAILED: sizes differ ' + $snapshotA.Length + ' vs ' + $snapshotB.Length)
          }
          for ($i = 0; $i -lt $snapshotA.Length; $i++) {
            if ($snapshotA[$i] -ne $snapshotB[$i]) {
              throw ('Idempotency FAILED at byte ' + $i)
            }
          }
          Write-Host 'OK: second run is byte-identical to first (idempotent)'

          Remove-Item -LiteralPath $p -Force

  cmd-syntax:
    name: cmd.exe parses IAS.cmd and Test_Script.cmd
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: IAS.cmd spawns detached cmd /k window + ping fallback in :done / :done2 hold
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $c = Get-Content -Raw -LiteralPath 'IAS.cmd'
          # v1.9.10 timeout/exit, v1.9.11 pause<con, v1.9.12 cmd/k inline,
          # v1.9.13 -> spawn detached `start cmd /k` + infinite ping fallback.
          $startSpawn = ([regex]::Matches($c, 'start "IAS-NADIF [^"]+" cmd /k')).Count
          if ($startSpawn -lt 2) {
            throw "IAS.cmd must spawn detached cmd /k window in BOTH :done and :done2 hold blocks; found $startSpawn"
          }
          # Pastikan label hold ada di luar parens.
          foreach ($lbl in ':done_unattended_hold',':done2_unattended_hold') {
            if ($c -notmatch [regex]::Escape($lbl)) {
              throw "IAS.cmd missing label $lbl"
            }
          }
          # Pastikan ada loop ping fallback (bulletproof; tidak peduli stdin).
          $pingLoops = ([regex]::Matches($c, 'ping 127\.0\.0\.1 -n 60')).Count
          if ($pingLoops -lt 2) {
            throw "IAS.cmd must have ping infinite-loop fallback in BOTH done blocks; found $pingLoops"
          }
          if ($c -notmatch 'goto :done_unattended_pingloop' -or $c -notmatch 'goto :done2_unattended_pingloop') {
            throw 'IAS.cmd missing `goto :done*_unattended_pingloop` infinite hold loop'
          }
          # Pastikan timeout /t 2 lama tidak balik.
          if ($c -match 'timeout /t 2 & exit /b') {
            throw 'IAS.cmd still uses regressed `timeout /t 2 & exit /b`'
          }
          Write-Host 'OK: IAS.cmd spawns detached cmd /k + ping-loop fallback'

      - name: Wrapper scripts skip pause on success (cmd /k handles it)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($f in 'Normal_Activation.cmd','Quick_Activation.cmd','Reset_Activation.cmd') {
            $c = Get-Content -Raw -LiteralPath $f
            # Pause hanya boleh muncul di branch 'if not "%ret%"=="0"'
            # (untuk error path), bukan di happy path.
            if ($c -match '(?m)^echo %\* \| find /i "/silent" >nul \|\| pause') {
              throw ($f + ' still pauses on success path; should only pause when ret != 0 because cmd /k in IAS.cmd already holds the window')
            }
            if ($c -notmatch 'if not "%ret%"=="0" \(\s*\r?\n\s*echo %\* \| find /i "/silent" >nul \|\| pause <con') {
              throw ($f + ' missing error-path pause `if not "%ret%"=="0" ... pause <con`')
            }
            Write-Host ('OK: ' + $f + ' pauses only on error path')
          }

      - name: Verify CRLF + ASCII hygiene
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($f in 'IAS.cmd','Test_Script.cmd','Quick_Activation.cmd','Normal_Activation.cmd','Reset_Activation.cmd') {
            $bytes = [System.IO.File]::ReadAllBytes((Join-Path (Get-Location) $f))
            if ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) { throw ($f + ' has UTF-8 BOM') }
            for ($i = 0; $i -lt $bytes.Length; $i++) {
              if ($bytes[$i] -eq 0x0A -and ($i -eq 0 -or $bytes[$i-1] -ne 0x0D)) { throw ($f + ' has LF without preceding CR at byte ' + $i) }
            }
            Write-Host ('OK: ' + $f + ' is CRLF clean')
          }

      - name: Dry-run IAS.cmd help-style invocation (must not crash, must exit non-zero without action flag)
        shell: cmd
        run: |
          rem  IAS.cmd without /act /frz /res and without /silent will fall into
          rem  the interactive main menu, which would hang CI. Use /silent with
          rem  no action flag -- the script explicitly rejects that combination
          rem  with exit code 2. This exercises the whole startup path (code
          rem  page, log init, admin check, architecture detection) without
          rem  actually touching the hosts file.
          call IAS.cmd /silent
          set "ias_exit=%errorlevel%"
          echo IAS.cmd exited with %ias_exit%
          if "%ias_exit%"=="0" (
            echo IAS.cmd exited 0 but should have rejected /silent without an action. FAIL.
            exit /b 1
          )
          echo IAS.cmd startup path parsed and short-circuited as expected.

  test-script-verifier:
    name: Test_Script.cmd hosts verifier branches
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check that the verifier block exists in Test_Script.cmd
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $content = Get-Content -Raw -LiteralPath 'Test_Script.cmd'
          $probes = @(
            'ERR_HOSTS_BYPASS',
            'IAS-NADIF-BLOCK START',
            'IAS-NADIF-BLOCK END',
            '0.0.0.0 registeridm.com',
            '0.0.0.0 tonec.com',
            'hostsScore'
          )
          foreach ($p in $probes) {
            if ($content -notmatch [regex]::Escape($p)) { throw ('Test_Script.cmd missing probe: ' + $p) }
            Write-Host ('OK: Test_Script.cmd contains ' + $p)
          }

      - name: Run Test_Script.cmd (runner is admin; expect exit 0 if env is clean or ERR_HOSTS_BYPASS bit if bypass not installed)
        shell: cmd
        run: |
          rem  Pipe <nul so the trailing `pause` returns immediately.
          call Test_Script.cmd <nul
          set "ts_exit=%errorlevel%"
          echo Test_Script.cmd exited with %ts_exit%
          rem  On a fresh GitHub runner, hosts file has never been touched by
          rem  IAS, so the verifier should emit the informational [!] branch
          rem  (which does NOT raise issues). Any IDM-related checks may raise
          rem  ERR_IDM_PATH=256 since IDM is not installed. We accept any exit
          rem  code as long as cmd.exe parsed Test_Script.cmd without a
          rem  hard syntax error.
          if %ts_exit% gtr 4095 (
            echo Test_Script.cmd exit code out of expected range. FAIL.
            exit /b 1
          )
          echo Test_Script.cmd parsed and executed cleanly.

  popup-watcher:
    name: popup_watcher.ps1 parses and compiles under Windows PowerShell 5.1
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell parse check of popup_watcher.ps1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $path = 'tools_nadif\popup_watcher.ps1'
          if (-not (Test-Path -LiteralPath $path)) { throw ($path + ' is missing') }
          $null = [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content -Raw -LiteralPath $path),
            [ref]$null
          )
          Write-Host 'OK: popup_watcher.ps1 tokenizes cleanly'

      - name: Add-Type compiles the embedded IASPopup C# block
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $src  = Get-Content -Raw -LiteralPath 'tools_nadif\popup_watcher.ps1'
          $m    = [regex]::Match($src, "@'(?<body>.*?)'@", 'Singleline')
          if (-not $m.Success) { throw 'Could not extract the C# here-string from popup_watcher.ps1' }
          $cs = $m.Groups['body'].Value
          Add-Type -TypeDefinition $cs -Language CSharp -ErrorAction Stop
          $expected = @('FindFakeSerialPopups','DismissAll')
          $actual   = [IASPopup].GetMethods('Public,Static') | ForEach-Object { $_.Name }
          foreach ($e in $expected) {
            if ($actual -notcontains $e) { throw ('IASPopup missing method: ' + $e) }
            Write-Host ('OK: IASPopup.' + $e + ' is reachable')
          }
          # No real IDM on the CI host; FindFakeSerialPopups must return an empty array
          # rather than throwing, which also exercises EnumWindows end-to-end.
          $hits = [IASPopup]::FindFakeSerialPopups()
          if ($null -eq $hits) { throw 'FindFakeSerialPopups returned $null' }
          Write-Host ('OK: FindFakeSerialPopups returned ' + $hits.Count + ' windows (0 expected on runner)')


      - name: IAS.cmd references install/uninstall popup_watcher hooks
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $c = Get-Content -Raw -LiteralPath 'IAS.cmd'
          foreach ($p in 'call :install_popup_watcher', 'call :uninstall_popup_watcher', ':install_popup_watcher', ':uninstall_popup_watcher', 'IAS-NADIF-PopupWatcher') {
            if ($c -notmatch [regex]::Escape($p)) { throw ('IAS.cmd missing: ' + $p) }
            Write-Host ('OK: IAS.cmd contains ' + $p)
          }

      - name: Trigger watcher triggers contain trial-expiry + buy-popup phrases
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Get-Content -Raw -LiteralPath 'tools_nadif\popup_watcher.ps1'
          $required = @(
            'fake Serial',
            'Serial Number has been blocked',
            'days left to use Internet Download Manager',
            'trial period has expired',
            'trial version has expired',
            '0 days left',
            'You may buy IDM to continue using it',
            'PLEASE ENTER YOUR SERIAL NUMBER',
            'ALREADY PURCHASED'
          )
          foreach ($p in $required) {
            if ($src -notmatch [regex]::Escape($p)) { throw ('popup_watcher.ps1 missing trigger phrase: ' + $p) }
            Write-Host ('OK: popup_watcher.ps1 matches phrase ' + $p)
          }
          # Hard guard: "Lifetime license" must NEVER be a trigger because the
          # benign "This product is licensed to ... This is a lifetime license"
          # info dialog would be force-closed otherwise.
          $m = [regex]::Match($src, "Triggers\s*=\s*new\s+string\[\]\s*\{(?<body>[^}]*)\}", 'Singleline')
          if (-not $m.Success) { throw 'Could not locate Triggers array in popup_watcher.ps1' }
          if ($m.Groups['body'].Value -match 'Lifetime license') {
            throw 'popup_watcher.ps1 Triggers array MUST NOT contain "Lifetime license" -- the benign lifetime-license info dialog would get force-closed.'
          }
          Write-Host 'OK: Triggers array does not contain "Lifetime license"'

      - name: popup_watcher.ps1 has real-time trial-counter wipe in hot loop
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Get-Content -Raw -LiteralPath 'tools_nadif\popup_watcher.ps1'
          foreach ($p in 'function Reset-TrialCounters','tvfrdt','radxcnt','ptrk_scdt','LstCheck','LastCheckQU','scansk','FromVersion','toV','HKCU:\Software\DownloadManager') {
            if ($src -notmatch [regex]::Escape($p)) { throw ('popup_watcher.ps1 missing trial-wipe token: ' + $p) }
            Write-Host ('OK: popup_watcher.ps1 contains ' + $p)
          }
          # Reset-TrialCounters MUST be invoked from the main while loop, not
          # just defined. Confirm a call exists somewhere after the function.
          if ($src -notmatch 'Reset-TrialCounters\s*$' -and $src -notmatch 'Reset-TrialCounters\s*\)' -and $src -notmatch 'Reset-TrialCounters\s*\r?\n') {
            # Fallback: just look for any non-definition occurrence after the function body
            $nonDef = ($src -split 'function Reset-TrialCounters', 2)[1]
            if (-not $nonDef -or ($nonDef -notmatch 'Reset-TrialCounters')) {
              throw 'popup_watcher.ps1 defines Reset-TrialCounters but never calls it'
            }
          }
          Write-Host 'OK: popup_watcher.ps1 invokes Reset-TrialCounters'
          # Hard guard: NEVER touch Serial/FName/LName/Email even from the watcher.
          foreach ($forbidden in 'Remove-ItemProperty.*-Name\s+.?Serial','Remove-ItemProperty.*-Name\s+.?FName','Remove-ItemProperty.*-Name\s+.?LName','Remove-ItemProperty.*-Name\s+.?Email') {
            if ($src -match $forbidden) { throw ('popup_watcher.ps1 contains forbidden pattern: ' + $forbidden) }
          }
          Write-Host 'OK: popup_watcher.ps1 never removes Serial/FName/LName/Email'

  trial-resetter:
    name: trial_reset.ps1 parses + IAS.cmd hooks trial resetter
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell parse check of trial_reset.ps1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $path = 'tools_nadif\trial_reset.ps1'
          if (-not (Test-Path -LiteralPath $path)) { throw ($path + ' is missing') }
          $null = [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content -Raw -LiteralPath $path),
            [ref]$null
          )
          Write-Host 'OK: trial_reset.ps1 tokenizes cleanly'

      - name: trial_reset.ps1 only touches known trial-counter values
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Get-Content -Raw -LiteralPath 'tools_nadif\trial_reset.ps1'
          $allowed = 'tvfrdt','radxcnt','ptrk_scdt','LstCheck','LastCheckQU','scansk','FromVersion','toV'
          foreach ($v in $allowed) {
            if ($src -notmatch [regex]::Escape("'" + $v + "'")) {
              throw ('trial_reset.ps1 missing expected value: ' + $v)
            }
          }
          # Hard guard: never remove Serial/FName/LName/Email - that would UNDO Normal Activation.
          foreach ($forbidden in 'Remove-ItemProperty.*-Name .Serial','Remove-ItemProperty.*-Name .FName','Remove-ItemProperty.*-Name .LName','Remove-ItemProperty.*-Name .Email') {
            if ($src -match $forbidden) { throw ('trial_reset.ps1 contains forbidden pattern: ' + $forbidden) }
          }
          Write-Host 'OK: trial_reset.ps1 scope is limited to trial counters'

      - name: IAS.cmd references install/uninstall trial_resetter hooks
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $c = Get-Content -Raw -LiteralPath 'IAS.cmd'
          foreach ($p in 'call :install_trial_resetter', 'call :uninstall_trial_resetter', ':install_trial_resetter', ':uninstall_trial_resetter', 'IAS-NADIF-TrialResetter') {
            if ($c -notmatch [regex]::Escape($p)) { throw ('IAS.cmd missing: ' + $p) }
            Write-Host ('OK: IAS.cmd contains ' + $p)
          }

      - name: IAS.cmd schedules trial_resetter every 5 minutes (not hourly)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $c = Get-Content -Raw -LiteralPath 'IAS.cmd'
          # The IAS-NADIF-TrialResetter task must use /sc minute /mo 5 so the
          # "0 days left" popup window cannot open between runs. Hourly was
          # too sparse and let the popup surface within minutes of logon.
          if ($c -notmatch '/sc minute /mo 5') {
            throw 'IAS.cmd does not schedule the trial resetter every 5 minutes (/sc minute /mo 5).'
          }
          Write-Host 'OK: trial resetter scheduled every 5 minutes'
          # And it must NOT regress to hourly on the create line.
          $createLine = ($c -split "`n") | Where-Object { $_ -match 'schtasks /create.*IAS-NADIF-TrialResetter|schtasks /create.*tr_task' -or $_ -match 'schtasks /create /tn "%tr_task%"' }
          foreach ($l in $createLine) {
            if ($l -match '/sc hourly') {
              throw 'IAS.cmd still uses /sc hourly on the trial-resetter create line: ' + $l
            }
          }
          Write-Host 'OK: no /sc hourly on trial-resetter create line'

      - name: IAS.cmd uses schtasks /run for popup watcher (not start /b)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $c = Get-Content -Raw -LiteralPath 'IAS.cmd'
          # The :install_popup_watcher subroutine MUST spawn the watcher via
          # `schtasks /run` so the PowerShell process detaches into the user
          # session instead of inheriting the IAS console (which previously
          # caused the console to close mid-activation under Normal mode).
          # Locate the :install_popup_watcher block and assert its content.
          $idx1 = $c.IndexOf(':install_popup_watcher')
          $idx2 = $c.IndexOf(':uninstall_popup_watcher', $idx1 + 1)
          if ($idx1 -lt 0 -or $idx2 -lt 0) { throw 'Could not isolate :install_popup_watcher block' }
          $block = $c.Substring($idx1, $idx2 - $idx1)
          if ($block -notmatch 'schtasks /run /tn "%pw_task%"') {
            throw ':install_popup_watcher must launch the watcher via `schtasks /run /tn "%pw_task%"`'
          }
          Write-Host 'OK: :install_popup_watcher uses schtasks /run as primary spawn path'
