name: Telegram Repo Update

# Required secrets:
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_CHANNEL_ID  # Telegram group/channel chat ID

'on':
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Telegram group notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          python - <<'PY'
          import html
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()
          if not token or not chat_id:
              raise SystemExit("Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHANNEL_ID GitHub secret.")

          zero_sha = "0" * 40
          before_sha_full = (os.environ.get("BEFORE_SHA") or "").strip()
          after_sha_full = (os.environ.get("SHA") or "").strip()

          def telegram_call(method, payload):
              data = urllib.parse.urlencode(payload).encode("utf-8")
              request = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/{method}",
                  data=data,
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      print(f"{method} response: {body}")
                      return json.loads(body)
              except urllib.error.HTTPError as exc:
                  error_body = exc.read().decode("utf-8", errors="replace")
                  print(f"{method} failed: HTTP {exc.code}")
                  print(error_body)
                  raise

          def run_git(*args):
              return subprocess.check_output(
                  ["git", *args],
                  text=True,
                  encoding="utf-8",
                  errors="replace",
              ).strip()

          def try_git(*args):
              try:
                  return run_git(*args)
              except Exception:
                  return ""

          def changed_file_list(*extra_args):
              raw = ""
              if before_sha_full and before_sha_full != zero_sha:
                  raw = try_git("diff", *extra_args, f"{before_sha_full}..{after_sha_full}")
              if not raw:
                  raw = try_git("show", *extra_args, "--pretty=format:", "HEAD")
              return [line.strip() for line in raw.splitlines() if line.strip()]

          def load_text_file(path):
              file_path = Path(path)
              if not file_path.exists():
                  return ""
              return file_path.read_text(encoding="utf-8", errors="replace")

          def load_previous_text(path):
              candidates = []
              if before_sha_full and before_sha_full != zero_sha:
                  candidates.append(before_sha_full)
              candidates.extend(["HEAD^", "HEAD~1"])
              for ref in candidates:
                  content = try_git("show", f"{ref}:{path}")
                  if content:
                      return content
              return ""

          def extract_version(*texts):
              patterns = (
                  r"IDM Activation Script v([0-9]+(?:\.[0-9]+){0,2})",
                  r"## v([0-9]+(?:\.[0-9]+){0,2})",
                  r"v([0-9]+(?:\.[0-9]+){0,2})",
              )
              for text in texts:
                  if not text:
                      continue
                  for pattern in patterns:
                      match = re.search(pattern, text, flags=re.IGNORECASE)
                      if match:
                          return match.group(1)
              return "unknown"

          def unique(values):
              seen = set()
              items = []
              for value in values or []:
                  if not isinstance(value, str):
                      continue
                  if value in seen:
                      continue
                  seen.add(value)
                  items.append(value)
              return items

          def tree_lines(items, fallback):
              if not items:
                  return [f"┗ <i>{fallback}</i>"]
              lines = []
              for index, item in enumerate(items):
                  branch = "┗" if index == len(items) - 1 else "┣"
                  lines.append(f"{branch} {item}")
              return lines

          def html_code_list(items, limit=5):
              clipped = unique(items)[:limit]
              return ", ".join(f"<code>{html.escape(item)}</code>" for item in clipped)

          def touches(*paths_or_prefixes):
              for path in changed_files:
                  for prefix in paths_or_prefixes:
                      normalized = prefix.rstrip("/")
                      if path == normalized or path.startswith(normalized + "/"):
                          return True
              return False

          def file_icon(path):
              lowered = path.lower()
              if lowered.endswith(".cmd"):
                  return "🧰"
              if lowered.endswith(".md"):
                  return "📝"
              if lowered.endswith(".txt"):
                  return "📄"
              if lowered.endswith((".yml", ".yaml")):
                  return "⚙️"
              if lowered.endswith(".zip"):
                  return "📦"
              if lowered.endswith(".sha256"):
                  return "🔐"
              return "📁"

          changed_files = changed_file_list("--name-only")
          added_files = changed_file_list("--diff-filter=A", "--name-only")
          event_name = (os.environ.get("EVENT_NAME") or "").strip()

          if (
              changed_files
              and all(path.startswith(".github/") for path in changed_files)
              and event_name != "workflow_dispatch"
          ):
              print("Skipping Telegram notification for workflow-only changes.")
              raise SystemExit(0)

          try:
              if before_sha_full and before_sha_full != zero_sha:
                  shortstat = run_git("diff", "--shortstat", f"{before_sha_full}..{after_sha_full}")
              else:
                  shortstat = run_git("show", "--shortstat", "--format=", "HEAD")
          except Exception:
              shortstat = ""

          commit_message = (os.environ.get("COMMIT_MESSAGE") or "").strip()
          if not commit_message:
              commit_message = try_git("log", "-1", "--pretty=%B")
          commit_message = commit_message.strip() or "(no commit message)"
          commit_lines = [line.strip() for line in commit_message.splitlines() if line.strip()]
          headline = commit_lines[0] if commit_lines else "(no commit message)"
          full_text = "\n".join(commit_lines).lower()

          if "[skip telegram]" in full_text or "[skip-telegram]" in full_text:
              print("Skipping Telegram notification because commit message requested it.")
              raise SystemExit(0)

          current_readme = load_text_file("README.md")
          previous_readme = load_previous_text("README.md")
          current_changelog = load_text_file("CHANGELOG.md")
          previous_changelog = load_previous_text("CHANGELOG.md")

          current_version = extract_version(current_readme, current_changelog)
          previous_version = extract_version(previous_readme, previous_changelog)
          if previous_version == "unknown":
              previous_version = ""

          script_files = [path for path in changed_files if path.lower().endswith(".cmd")]
          doc_files = [
              path
              for path in changed_files
              if path in {"README.md", "CHANGELOG.md", "SECURITY.md", "Instructions.txt"}
          ]
          release_files = [path for path in changed_files if path.startswith("release/")]
          issue_template_files = [path for path in changed_files if path.startswith(".github/ISSUE_TEMPLATE/")]

          release_zip_names = [Path(path).name for path in release_files if path.lower().endswith(".zip")]
          added_release_files = [Path(path).name for path in added_files if path.startswith("release/")]

          badges = ["<code>📢 IDM NADIF</code>"]
          if current_version != "unknown":
              badges.append(f"<code>🔖 v{html.escape(current_version)}</code>")
          if script_files:
              badges.append("<code>🧰 SCRIPT</code>")
          if doc_files:
              badges.append("<code>📝 DOCS</code>")
          if release_files:
              badges.append("<code>📦 RELEASE</code>")
          if issue_template_files:
              badges.append("<code>🤝 COMMUNITY</code>")

          important_points = []
          if current_version != "unknown":
              if previous_version and current_version != previous_version:
                  important_points.append(
                      f"🔖 Versi repo bergerak dari <code>v{html.escape(previous_version)}</code> ke <code>v{html.escape(current_version)}</code>."
                  )
              else:
                  important_points.append(
                      f"🔖 Build aktif repo saat ini berada di <code>v{html.escape(current_version)}</code>."
                  )

          if script_files:
              important_points.append(
                  f"🧰 Skrip yang ikut berubah: {html_code_list([Path(path).name for path in script_files])}."
              )

          if touches("Test_Script.cmd"):
              important_points.append("🛠 Jalur diagnostik ikut disentuh, jadi pemeriksaan lingkungan kemungkinan ikut diperbarui.")

          if doc_files:
              important_points.append(
                  f"📝 Dokumentasi yang diperbarui: {html_code_list([Path(path).name for path in doc_files])}."
              )

          if issue_template_files:
              important_points.append("🤝 Template issue/community ikut dirapikan untuk alur laporan yang lebih jelas.")

          if release_files:
              if release_zip_names:
                  important_points.append(
                      f"📦 Paket rilis yang ikut berubah: {html_code_list(release_zip_names)}."
                  )
              else:
                  important_points.append("📦 Folder rilis ikut berubah pada push ini.")

          important_points = unique(important_points)[:5]

          project_points = []
          if current_version == "1.9.5":
              project_points.append("🚀 Rilis <code>v1.9.5</code> membawa pembaruan skrip, dokumentasi, dan paket distribusi terbaru.")

          if added_release_files:
              project_points.append(
                  f"📁 File baru pada area rilis: {html_code_list(added_release_files)}."
              )

          if touches("Quick_Activation.cmd", "Normal_Activation.cmd", "Reset_Activation.cmd"):
              project_points.append("⚡ Shortcut utama ikut disentuh, sehingga alur masuk pengguna kemungkinan berubah atau dirapikan.")

          if touches("README.md", "CHANGELOG.md", "Instructions.txt", "SECURITY.md"):
              project_points.append("📚 Bagian panduan dan catatan perubahan ikut diselaraskan dengan kondisi repo terbaru.")

          if touches("IAS.cmd"):
              project_points.append("🧠 Skrip inti <code>IAS.cmd</code> ikut berubah, jadi update ini menyentuh perilaku utama proyek.")

          project_points = unique(project_points)[:4]

          file_lines = []
          for path in changed_files[:8]:
              file_lines.append(f"{file_icon(path)} <code>{html.escape(path)}</code>")
          if len(changed_files) > 8:
              file_lines.append(f"➕ <i>{len(changed_files) - 8} file lain juga ikut berubah</i>")

          short_sha = (after_sha_full or "")[:7]
          before_sha = (before_sha_full or "")[:7]
          compare_url = (os.environ.get("COMPARE_URL") or "").strip()
          commit_url = os.environ.get("COMMIT_URL", "").strip()
          run_url = os.environ.get("RUN_URL", "").strip()
          repository = os.environ.get("REPOSITORY", "-").strip()
          branch = os.environ.get("BRANCH", "-").strip()
          actor = os.environ.get("ACTOR", "-").strip()

          release_banner = "🚀 <b>LATEST UPDATE: INTERNET DOWNLOAD MANAGER</b>"
          release_subtitle = (
              f"<code>V.{html.escape(current_version)}</code>"
              if current_version != "unknown"
              else "<code>IDM Activation Script by Nadif Rizky</code>"
          )

          if current_version == "1.9.5":
              narrative = [
                  "Halo semuanya! Repo <b>IDM Nadif</b> baru saja menerima pembaruan ke versi <b>1.9.5</b>.",
                  "",
                  "🧰 <b>Fokus Update</b>",
                  "• Penyempurnaan skrip utama dan shortcut satu klik agar struktur repo lebih rapi dan mudah diikuti.",
                  "• Area diagnosis, dokumentasi, dan paket rilis ikut diselaraskan supaya informasi versi terbaru lebih jelas.",
                  "",
                  "📦 <b>Paket Distribusi</b>",
                  "• Arsip rilis dan checksum dapat dipantau langsung dari perubahan pada folder <code>release/</code> bila ikut tersentuh.",
                  "",
                  "📁 <b>Cara Mengikuti Update</b>",
                  "1. Buka commit atau workflow run terbaru dari tautan di bawah.",
                  "2. Unduh paket rilis terbaru jika push ini menyertakan pembaruan pada folder <code>release/</code>.",
                  "3. Baca README dan CHANGELOG untuk detail perubahan sebelum membagikan update ke pengguna lain.",
                  "",
              ]
          else:
              narrative = [
                  "Halo semuanya! Repo <b>IDM Nadif</b> baru saja menerima update terbaru.",
                  "",
                  "📝 <b>Ringkasnya</b>",
                  "• Notifikasi ini merangkum versi aktif, file yang berubah, dan area repo yang ikut disentuh.",
                  "• Cocok dipakai untuk memantau perubahan skrip, dokumentasi, dan paket rilis dalam satu pesan singkat.",
                  "",
                  "📁 <b>Cara Mengikuti Update</b>",
                  "1. Tinjau commit terbaru dari tautan di bawah.",
                  "2. Jika ada perubahan pada folder <code>release/</code>, ambil paket distribusi yang paling baru.",
                  "3. Cek README dan CHANGELOG untuk konteks lengkap perubahan.",
                  "",
              ]

          quick_links = [f"🔗 <a href=\"{html.escape(commit_url or '-')}\">Open Commit</a>"]
          if compare_url and before_sha and short_sha:
              quick_links.append(
                  f"🧭 <a href=\"{html.escape(compare_url)}\">Compare {html.escape(before_sha)}..{html.escape(short_sha)}</a>"
              )
          quick_links.append(f"📍 <a href=\"{html.escape(run_url or '-')}\">Open Workflow Run</a>")

          text = "\n".join(
              [
                  release_banner,
                  release_subtitle,
                  "",
                  " ".join(badges),
                  "",
                  *narrative,
                  "┏ <b>Build Info</b>",
                  f"┣ 📦 Repo: <code>{html.escape(repository)}</code>",
                  f"┣ 🌿 Branch: <code>{html.escape(branch)}</code>",
                  f"┣ 🔖 Commit: <code>{html.escape(short_sha or '-')}</code>",
                  f"┣ 👤 Author: <code>{html.escape(actor)}</code>",
                  f"┗ 📝 Message: <i>{html.escape(headline)}</i>",
                  "",
                  "┏ <b>Highlight</b>",
                  *tree_lines(important_points, "Belum ada highlight khusus untuk push ini."),
                  "",
                  "┏ <b>Repo Notes</b>",
                  *tree_lines(project_points, "Push ini lebih bersifat rutin tanpa penanda area khusus."),
                  "",
                  "┏ <b>Files Changed</b>",
                  *tree_lines(file_lines, "No files changed."),
                  *(
                      [f"📊 <i>{html.escape(shortstat)}</i>"]
                      if shortstat
                      else [f"📊 <i>{len(changed_files)} file(s) changed</i>"]
                  ),
                  "",
                  "┏ <b>Quick Links</b>",
                  *tree_lines(quick_links, "No links available."),
              ]
          )

          telegram_call("getMe", {})
          telegram_call("getChat", {"chat_id": chat_id})
          telegram_call(
              "sendMessage",
              {
                  "chat_id": chat_id,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": "true",
              },
          )
          PY
